name: DStore Compile

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/developdstore/open-dstore-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      BUILD_ROOT: ${{ github.workspace }}
      LOCAL_LIB_PATH: /opt/project/local_libs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build utils
        run: |
          source ${BUILD_ROOT}/buildenv
          cd ${BUILD_ROOT}/utils
          bash build.sh -m release

      - name: Build dstore (release)
        run: |
          source ${BUILD_ROOT}/buildenv
          cd ${BUILD_ROOT}
          bash build.sh -m release

      - name: Verify release artifacts
        run: |
          echo "Checking release build artifacts..."
          test -f ${BUILD_ROOT}/utils/output/lib/libgsutils.so && echo "libgsutils.so OK" || exit 1
          test -f ${BUILD_ROOT}/output/lib/libdstore.so && echo "libdstore.so OK" || exit 1
          test -f ${BUILD_ROOT}/output/lib/libdstore.a && echo "libdstore.a OK" || exit 1
          echo "Release artifacts verified."

      - name: Build dstore (debug)
        run: |
          source ${BUILD_ROOT}/buildenv
          cd ${BUILD_ROOT}
          mkdir -p tmp_build && cd tmp_build
          cmake .. -DCMAKE_BUILD_TYPE=debug -DUTILS_PATH=../utils/output -DENABLE_UT=ON
          make -sj$(nproc) install

      - name: Verify debug artifacts
        run: |
          echo "Checking debug build artifacts..."
          test -d ${BUILD_ROOT}/tmp_build && echo "tmp_build directory OK" || exit 1
          echo "Debug build verified."
